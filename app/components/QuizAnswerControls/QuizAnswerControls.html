<section class="quiz-answer-controls" style="display: none;" aria-label="Answer Control Panel">
    <div class="quiz-answer-controls__container">
        <div class="quiz-answer-controls__team-info">
            <span class="quiz-answer-controls__label">Answering Team:</span>
            <span class="quiz-answer-controls__team-name">-</span>
        </div>
        <div class="quiz-answer-controls__buttons">
            <button 
                class="quiz-answer-controls__button quiz-answer-controls__button--correct"
                type="button"
                data-action="correct"
                aria-label="Mark Answer as Correct"
            >
                <span class="quiz-answer-controls__icon">✓</span>
                <span class="quiz-answer-controls__text">Correct</span>
            </button>
            <button 
                class="quiz-answer-controls__button quiz-answer-controls__button--incorrect"
                type="button"
                data-action="incorrect"
                aria-label="Mark Answer as Incorrect"
            >
                <span class="quiz-answer-controls__icon">✗</span>
                <span class="quiz-answer-controls__text">Incorrect</span>
            </button>
        </div>
    </div>
</section>
