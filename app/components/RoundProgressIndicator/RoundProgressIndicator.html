<div class="round-progress-indicator" id="roundProgressIndicator">
    <div class="round-progress-indicator__header">
        <div class="round-progress-indicator__round-info">
            <span class="round-progress-indicator__label">Round</span>
            <span class="round-progress-indicator__current-round" id="currentRound">0</span>
            <span class="round-progress-indicator__total-rounds">/ <span id="totalRounds">20</span></span>
        </div>
        
        <div class="round-progress-indicator__phase" id="gamePhase">
            <span class="round-progress-indicator__phase-indicator" id="phaseIndicator"></span>
            <span class="round-progress-indicator__phase-text" id="phaseText">Waiting</span>
        </div>
    </div>
    
    <div class="round-progress-indicator__progress-bar">
        <div class="round-progress-indicator__progress-track">
            <div class="round-progress-indicator__progress-fill" id="progressFill"></div>
        </div>
        <div class="round-progress-indicator__progress-text" id="progressText">0%</div>
    </div>
    
    <div class="round-progress-indicator__timing">
        <div class="round-progress-indicator__timing-item">
            <span class="round-progress-indicator__timing-label">Time Limit</span>
            <span class="round-progress-indicator__timing-value" id="timeLimit">200ms</span>
        </div>
        
        <div class="round-progress-indicator__timing-item">
            <span class="round-progress-indicator__timing-label">Remaining Teams</span>
            <span class="round-progress-indicator__timing-value" id="remainingTeams">0</span>
        </div>
        
        <div class="round-progress-indicator__timing-item">
            <span class="round-progress-indicator__timing-label">Round Timer</span>
            <span class="round-progress-indicator__timing-value" id="roundTimer">—</span>
        </div>
    </div>
    
    <div class="round-progress-indicator__status-message" id="statusMessage">
        Waiting for game to start...
    </div>
</div>
