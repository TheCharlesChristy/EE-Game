<div class="main-navigation-grid">
    <div class="navigation-grid">
        <button class="game-button" data-game="reaction-timer" aria-label="Start Reaction Timer Game">
            <div class="game-icon">⚡</div>
            <h3 class="game-title">Reaction Timer</h3>
            <p class="game-description">Fast-paced reaction game with elimination rounds</p>
            <div class="game-status" data-status="available">Ready to Play</div>
        </button>
        
        <button class="game-button" data-game="wheel-game" aria-label="Start Wheel Game">
            <div class="game-icon">🎯</div>
            <h3 class="game-title">Wheel Game</h3>
            <p class="game-description">Tournament-style competition with multiple game modes</p>
            <div class="game-status" data-status="available">Ready to Play</div>
        </button>
        
        <button class="game-button" data-game="quiz-game" aria-label="Start Quiz Game">
            <div class="game-icon">🧠</div>
            <h3 class="game-title">Quiz Game</h3>
            <p class="game-description">Buzzer-based quiz competition</p>
            <div class="game-status" data-status="available">Ready to Play</div>
        </button>
    </div>
    
    <div class="error-message" id="navigationError" role="alert" aria-live="polite" style="display: none;">
        <p>Unable to start game. Please check system status and try again.</p>
    </div>
</div>
