<section class="quiz-question-display" role="main" aria-label="Quiz Question Display">
    <div class="quiz-question-display__container">
        <div class="quiz-question-display__content" data-state="waiting">
            <div class="quiz-question-display__main-area">
                <p class="quiz-question-display__instruction" aria-live="polite">
                    Press START to begin the quiz game
                </p>
                <h2 class="quiz-question-display__text" aria-live="assertive"></h2>
                <div class="quiz-question-display__points" style="display: none;">
                    <span class="quiz-question-display__points-value">0</span>
                    <span class="quiz-question-display__points-label">Points</span>
                </div>
            </div>
            <div class="quiz-question-display__buzzer-indicator" style="display: none;">
                <span class="quiz-question-display__buzzer-icon">🔔</span>
                <span class="quiz-question-display__buzzer-text">Buzzers Active</span>
            </div>
        </div>
        <div class="quiz-question-display__overlay"></div>
    </div>
    <div class="quiz-question-display__answers" style="display: none;">
    <div class="quiz-question-display__answers-grid">
        <div class="quiz-question-display__answer-option" data-index="0">
            <span class="quiz-question-display__answer-letter">A</span>
            <span class="quiz-question-display__answer-text"></span>
        </div>
        <div class="quiz-question-display__answer-option" data-index="1">
            <span class="quiz-question-display__answer-letter">B</span>
            <span class="quiz-question-display__answer-text"></span>
        </div>
        <div class="quiz-question-display__answer-option" data-index="2">
            <span class="quiz-question-display__answer-letter">C</span>
            <span class="quiz-question-display__answer-text"></span>
        </div>
        <div class="quiz-question-display__answer-option" data-index="3">
            <span class="quiz-question-display__answer-letter">D</span>
            <span class="quiz-question-display__answer-text"></span>
        </div>
    </div>
</div>
</section>
