<div class="team-configuration-list">
  <div class="list-header">
    <h3>Registered Teams</h3>
    <span class="team-count">0 teams</span>
  </div>
  
  <div class="teams-container">
    <div class="no-teams-message" style="display: block;">
      <p>No teams registered yet. Use the form below to add your first team.</p>
    </div>
    
    <div class="teams-list" style="display: none;">
      <!-- Teams will be dynamically inserted here -->
    </div>
  </div>
  
  <!-- Edit Team Modal -->
  <div class="edit-modal-overlay" style="display: none;">
    <div class="edit-modal">
      <div class="edit-modal-header">
        <h3>Edit Team</h3>
        <button class="close-modal-btn" type="button">&times;</button>
      </div>
      
      <form class="edit-team-form">
        <div class="form-group">
          <label for="edit-team-name">Team Name</label>
          <input type="text" id="edit-team-name" name="teamName" required maxlength="30" />
          <div class="input-feedback" id="edit-name-feedback"></div>
        </div>
        
        <div class="form-group">
          <label for="edit-team-color">Team Color</label>
          <div class="color-selector">
            <input type="color" id="edit-team-color" name="teamColor" />
            <div class="color-preview"></div>
          </div>
        </div>
        
        <div class="form-group">
          <label>Assigned Pins</label>
          <div class="pins-display">
            <div class="pin-item">
              <label>Pin 1:</label>
              <select name="pin1" required>
                <option value="">Select Pin</option>
                <!-- Options will be populated dynamically -->
              </select>
            </div>
            <div class="pin-item">
              <label>Pin 2:</label>
              <select name="pin2" required>
                <option value="">Select Pin</option>
                <!-- Options will be populated dynamically -->
              </select>
            </div>
            <div class="pin-item">
              <label>Pin 3:</label>
              <select name="pin3" required>
                <option value="">Select Pin</option>
                <!-- Options will be populated dynamically -->
              </select>
            </div>
          </div>
          <div class="input-feedback" id="edit-pins-feedback"></div>
        </div>
        
        <div class="form-actions">
          <button type="button" class="cancel-btn">Cancel</button>
          <button type="submit" class="save-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
