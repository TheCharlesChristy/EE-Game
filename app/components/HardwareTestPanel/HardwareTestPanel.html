<div class="hardware-test-panel">
  <div class="panel-header">
    <h3>Hardware Testing</h3>
    <div class="test-summary">
      <span class="test-status">Ready to test</span>
      <div class="bulk-actions">
        <button type="button" class="btn btn-secondary test-all-btn" disabled>
          Test All Teams
        </button>
      </div>
    </div>
  </div>
  
  <div class="test-container">
    <div class="no-teams-testing" style="display: block;">
      <div class="empty-state">
        <p>No teams registered for testing yet.</p>
        <p class="empty-subtitle">Add teams above to enable hardware testing.</p>
      </div>
    </div>
    
    <div class="teams-test-list" style="display: none;">
      <!-- Team test items will be dynamically inserted here -->
    </div>
  </div>
  
  <div class="test-results-summary">
    <div class="summary-header">
      <h4>Test Results Summary</h4>
      <div class="results-stats">
        <span class="stat passed">0 Passed</span>
        <span class="stat failed">0 Failed</span>
        <span class="stat pending">0 Pending</span>
      </div>
    </div>
    
    <div class="websocket-status">
      <div class="connection-indicator">
        <span class="status-dot disconnected"></span>
        <span class="status-text">Hardware connection: Disconnected</span>
      </div>
      <button type="button" class="btn btn-secondary reconnect-btn" style="display: none;">
        Reconnect
      </button>
    </div>
  </div>
</div>
