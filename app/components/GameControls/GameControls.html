<section class="game-controls" aria-label="Game Control Panel">
    <div class="game-controls__container">
        <button 
            class="game-controls__button game-controls__button--start"
            type="button"
            data-action="start"
            aria-label="Start Reaction Timer Game"
        >
            <span class="game-controls__icon">▶</span>
            <span class="game-controls__label">Start Game</span>
        </button>

        <button 
            class="game-controls__button game-controls__button--stop"
            type="button"
            data-action="stop"
            aria-label="Stop Current Game"
            disabled
        >
            <span class="game-controls__icon">⏹</span>
            <span class="game-controls__label">Stop Game</span>
        </button>
    </div>

    <div class="game-controls__status" role="status" aria-live="polite">
        <span class="game-controls__status-text">Ready to Start</span>
        <div class="game-controls__loading" aria-hidden="true">
            <div class="game-controls__spinner"></div>
        </div>
    </div>
</section>
