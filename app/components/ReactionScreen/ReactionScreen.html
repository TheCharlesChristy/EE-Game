<section class="reaction-screen" role="main" aria-label="Reaction Timer Game Screen">
    <div class="reaction-screen__container">
        <div class="reaction-screen__content" data-state="neutral">
            <div class="reaction-screen__main-text" aria-live="assertive">
                <span class="reaction-screen__text">GET READY</span>
            </div>
            
            <div class="reaction-screen__icon" aria-hidden="true">
                <span class="reaction-screen__symbol">⚡</span>
            </div>
            
            <div class="reaction-screen__countdown" aria-live="polite">
                <span class="reaction-screen__countdown-text"></span>
            </div>
        </div>
        
        <div class="reaction-screen__overlay"></div>
    </div>
</section>
