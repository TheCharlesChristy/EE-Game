<div class="team-status-display" id="teamStatusDisplay">
    <div class="team-status-display__header">
        <h3 class="team-status-display__title">Team Status</h3>
        <div class="team-status-display__game-info" id="gameInfo">
            <span class="team-status-display__game-type">Reaction Timer</span>
            <span class="team-status-display__separator">•</span>
            <span class="team-status-display__active-teams" id="activeTeamsCount">0 teams active</span>
        </div>
    </div>
    
    <div class="team-status-display__grid" id="teamStatusGrid">
        <!-- Team status cards will be dynamically inserted here -->
    </div>
    
    <div class="team-status-display__legend">
        <div class="team-status-display__legend-item">
            <div class="team-status-display__life team-status-display__life--active"></div>
            <span>Life remaining</span>
        </div>
        <div class="team-status-display__legend-item">
            <div class="team-status-display__life team-status-display__life--lost"></div>
            <span>Life lost</span>
        </div>
        <div class="team-status-display__legend-item">
            <div class="team-status-display__status-indicator team-status-display__status-indicator--eliminated"></div>
            <span>Eliminated</span>
        </div>
    </div>
</div>
