<section class="team-status-display" aria-label="Team Status and Lives">
    <div class="team-status-display__container">
        <h2 class="team-status-display__title">Team Status</h2>
        
        <div class="team-status-display__grid" role="grid" aria-label="Team status grid">
            <!-- example team -->
            <div class="team-status-display__team" data-team="1" data-status="active" role="gridcell">
                <div class="team-status-display__team-header">
                    <h3 class="team-status-display__team-name">Team 1</h3>
                    <span class="team-status-display__team-status">Active</span>
                </div>
                <div class="team-status-display__lives" role="img" aria-label="3 lives remaining">
                    <span class="team-status-display__life team-status-display__life--active">●</span>
                    <span class="team-status-display__life team-status-display__life--active">●</span>
                    <span class="team-status-display__life team-status-display__life--active">●</span>
                </div>
            </div>
        </div>
    </div>
</section>
