; EE-Game firmware — PlatformIO project configuration
; SRS reference: Section 11.1 (Firmware Stack), Section 4 (Fixed Design Decisions)

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/git_sha.py
build_flags =
    -DBOARD_ESP32C3
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.1.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/git_sha.py
build_flags =
    -DBOARD_ESP32DEV
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.1.0
